name: Refresh industry screen

on:
  schedule:
    # 1st and 15th of every month at 02:30 UTC (~08:00 IST) — a ~two-week cadence
    - cron: "30 2 1,15 * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: screen
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run screen + regenerate site
        run: |
          python screen.py
          python generate_site.py

      - name: Commit refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data.json docs/index.html
          if git diff --staged --quiet; then
            echo "No changes this run."
          else
            git commit -m "Bi-weekly screen refresh ($(date -u +%Y-%m-%d))"
            git push
          fi
